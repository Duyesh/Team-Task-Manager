<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Team Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo">TT</div>
        <h1 class="brand-title">Team Task Manager</h1>
      </div>

      <h2 class="login-title">Welcome Back 👋</h2>
      <p class="login-sub">Sign in to keep your team in sync.</p>

      <label class="field-label" for="email">Email</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input type="email" id="email" placeholder="you@team.com" />
      </div>

      <label class="field-label" for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary btn-block" onclick="login()">Sign In</button>

      <p class="login-foot">Stay productive, stay together ✨</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
